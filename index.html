<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <title>Marbles 3D</title>
    <script src="./filament.js"></script>
    <style>
        /* Critical styles only — enough to avoid a white flash before the app shell mounts. */
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas { display: block; }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <canvas id="speedlines-canvas"></canvas>
    <canvas id="webgpu-particles-canvas"></canvas>

    <!-- Static UI partials are mounted here by src/ui/mount-shell.js before game init. -->
    <div id="ui-root"></div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
