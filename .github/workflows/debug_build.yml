name: Marbles CI

on:
  push:
    branches: [main, debug-ci]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Marbles 3D — validate assets, run unit tests, lint, typecheck, build WASM + Vite bundle.
# Playwright e2e tests (tests/e2e/) are manual: start `npm run dev`, then `npm run test:e2e`.

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate assets
        run: npm run validate:assets

      - name: Unit tests
        run: npm run test:unit

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.50'
          no-cache: true

      - name: Build WASM and Vite app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: marbles-dist
          path: |
            dist/
            public/wasm/marble_physics.js
            public/wasm/marble_physics.wasm
          retention-days: 7
