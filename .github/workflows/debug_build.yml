name: Debug Build (Codepit)

on:
  push:
    branches: [main, debug-ci]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      # Note: The web_sequencer submodule has its own debug_build.yml workflow
      # that runs independently. This workflow is for codepit-level debugging.
      # 
      # For web_sequencer builds, see:
      # .github/workflows/debug_build.yml
          
      - name: Clone projects
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}
          HOME: ${{ github.workspace }}
        run: |
          ./setup.sh clone web_sequencer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false
          
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
          
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
            
      # Note: web_sequencer has its own workflow. 
      # This is just a compatibility check for the codepit parent repo.
      - name: Check web_sequencer workflow exists
        run: |
          if [ -f ".github/workflows/debug_build.yml" ]; then
            echo "✅ web_sequencer has its own debug_build.yml"
            echo "For detailed builds, check the web_sequencer workflow runs"
          fi

      - name: Setup projects
        run: |
          chmod +x ./setup.sh
          PROJECTS_DIR=./projects ./setup.sh clone web_sequencer || echo "Failed to clone web_sequencer, but continuing"
          ls -la projects/web_sequencer || true
          
      - name: Install dependencies (web_sequencer)
        working-directory: ./projects/web_sequencer
        run: |
          # Retry pnpm install up to 3 times to mitigate transient network errors (e.g., 504 Gateway Timeout from GitHub Releases for wasm-pack)
          for i in {1..3}; do
            pnpm install --no-frozen-lockfile && break || {
              echo "pnpm install failed, retrying ($i/3)..."
              sleep 5
              if [ $i -eq 3 ]; then
                echo "Failed to install dependencies after 3 attempts."
                exit 1
              fi
            }
          done
        
      # Setup Emscripten (matching web_sequencer workflow version)
      - name: Setup Emscripten
        # use tip-of-tree build by default; this keeps CI aligned with the
        # local development environment that now installs `tot`.
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.50'
          no-cache: true
          
      - name: Verify Emscripten
        run: |
          emcc --version
          
      # Build WASM modules
      - name: Build Vite app
        working-directory: .
        run: npm run build
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            dist/
            public/*.wasm
            public/*.js
          retention-days: 7
