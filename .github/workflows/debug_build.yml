name: Marbles CI

on:
  push:
    branches: [main, debug-ci]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Marbles 3D — validate assets, run unit tests, lint, typecheck, build WASM + Vite bundle.
# E2E smoke (tests/e2e/smoke.cjs): optional job after build — continue-on-error on PRs.
# Local: npm run build && npm run preview -- --port 5173 &  then  BASE_URL=http://localhost:5173 npm run test:e2e:smoke
# Full missile e2e: npm run dev  then  npm run test:e2e

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate assets
        run: npm run validate:assets

      - name: Unit tests
        run: npm run test:unit

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.50'
          no-cache: true

      - name: Build WASM and Vite app
        run: npm run build

      - name: WASM parity tests
        run: node tests/test_wasm_bridge_wasm.js

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: marbles-dist
          path: |
            dist/
            public/wasm/marble_physics.js
            public/wasm/marble_physics.wasm
          retention-days: 7

  e2e-smoke:
    needs: ci
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: marbles-dist
          path: .

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start preview server
        run: |
          npm run preview -- --port 5173 --host 127.0.0.1 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5173/ > /dev/null; then
              echo "Preview server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Preview server failed to start"
          exit 1

      - name: E2E smoke test
        run: BASE_URL=http://127.0.0.1:5173/ npm run test:e2e:smoke
