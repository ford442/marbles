<div id="touch-controls" class="hidden" aria-hidden="true">
    <div id="touch-joystick" class="touch-joystick" aria-label="Move">
        <div id="touch-joystick-knob" class="touch-joystick-knob"></div>
    </div>
    <div class="touch-actions">
        <button id="touch-btn-boost" class="touch-btn touch-btn-secondary" type="button" aria-label="Boost">⚡</button>
        <button id="touch-btn-jump" class="touch-btn touch-btn-primary" type="button" aria-label="Jump">⬆</button>
    </div>
    <div id="touch-camera-zone" class="touch-camera-zone" aria-hidden="true"></div>
